services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume_app
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini #php config
    extra_hosts:
      - "host.docker.internal:host-gateway" #enable connection to N8N
    networks:
      - resume_app

  nginx:
    image: nginx:alpine
    container_name: resume_app_nginx
    ports:
      - "9100:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf #nginx config
    depends_on:
      - app
    networks:
      - resume_app

  mariadb:
    image: mariadb:latest
    container_name: resume_app_mariadb
    environment:
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "9101:3306"
    volumes:
      - db_data:/var/lib/mariadb
    networks:
      - resume_app

  redis:
    image: redis:alpine
    container_name: resume_app_redis
    ports:
      - "9102:6379"
    networks:
      - resume_app

  mailpit:
    image: axllent/mailpit
    container_name: resume_app_mailpit
    ports:
      - "9103:8025"   # Web UI
      - "9104:1025"   # SMTP
    networks:
      - resume_app

networks:
  resume_app:
    driver: bridge

volumes:
  db_data:
    driver: local
