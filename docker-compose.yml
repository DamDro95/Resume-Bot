services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume_app
    working_dir: /var/www
    volumes:
      - .:/var/www                          # Live code sync
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - resume_app

  nginx:
    image: nginx:alpine
    container_name: resume_app_nginx
    ports:
      - "9100:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - resume_app

  mysql:
    image: mysql:8.0
    container_name: resume_app_mysql
    environment:
      MYSQL_DATABASE: resume_app
      MYSQL_USER: resume_app
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "9101:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - resume_app

  redis:
    image: redis:alpine
    container_name: resume_app_redis
    ports:
      - "9102:6379"
    networks:
      - resume_app

  mailpit:
    image: axllent/mailpit
    container_name: resume_app_mailpit
    ports:
      - "9103:8025"   # Web UI
      - "9104:1025"   # SMTP
    networks:
      - resume_app

networks:
  resume_app:
    driver: bridge

volumes:
  mysql_data:
    driver: local
